services:
  postgres:
    image: postgres:16
    container_name: taxi-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_DB_USER: ${APP_DB_USER} # ← передаём в контейнер
      APP_DB_PASSWORD: ${APP_DB_PASSWORD} # ← передаём в контейнер
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - taxi_postgres_data:/var/lib/postgresql/data
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh # ← .sh вместо .sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: taxi-backend
    ports:
      - "${BACKEND_PORT:-8005}:8000"
    env_file:
      - ./backend/.env
    environment:
      DB_USER: ${APP_DB_USER} # ← из корневого .env
      DB_PASSWORD: ${APP_DB_PASSWORD} # ← из корневого .env
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: taxi-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  taxi_postgres_data:
    name: taxi_postgres_data
