services:
  postgres:
    image: postgres:16
    container_name: taxi-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - taxi_postgres_data:/var/lib/postgresql/data
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taxi-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taxi-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Передаём строку подключения к БД из корневого .env
      - DATABASE_URL=postgresql://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taxi-network

  frontend:
    build: ./frontend
    container_name: taxi-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - taxi-network

volumes:
  taxi_postgres_data:
    name: taxi_postgres_data

networks:
  taxi-network:
    name: taxi-network
    driver: bridge
